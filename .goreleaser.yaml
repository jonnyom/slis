version: 2

builds:
  - main: ./cmd/slis
    binary: slis
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - "-s -w -X github.com/jonnyom/slis/internal/cli.Version={{.Version}}"

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: jonnyom
      name: homebrew-tap
    homepage: "https://github.com/jonnyom/slis"
    description: "Multi-repo worktree cockpit"
    install: |
      bin.install "slis"

release:
  github:
    owner: jonnyom
    name: slis

changelog:
  use: github
