version: 2

builds:
  - main: ./cmd/slis
    binary: slis
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - "-s -w -X github.com/jonnyom/slis/internal/cli.Version={{.Version}}"

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Homebrew distribution is hand-managed in the jonnyom/homebrew-tap repo via a
# source-build formula (git clone + go build), so a private repo installs with
# no tokens/secrets. See that repo's Formula/slis.rb. GoReleaser here only builds
# downloadable binary archives + GitHub releases.

release:
  github:
    owner: jonnyom
    name: slis

changelog:
  use: github
