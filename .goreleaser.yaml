version: 2

# Cross-compile the JS TUI (`slis-ui`) for every target before GoReleaser builds
# the Go binary, so each archive can bundle its matching `slis-ui` alongside
# `slis`. The script installs the tui-js deps for all platforms and runs
# `bun build --compile` per target into tui-js/dist/<goos>-<goarch>/slis-ui.
# Needs `bun` on PATH (the release workflow installs it via oven-sh/setup-bun).
before:
  hooks:
    - ./scripts/build-slis-ui.sh

builds:
  - main: ./cmd/slis
    binary: slis
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - "-s -w -X github.com/jonnyom/slis/internal/cli.Version={{.Version}}"

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Ship the platform-matched `slis-ui` next to `slis` at the archive root, so
    # a `slis` install finds its sibling JS TUI (internal/cli.resolveUILaunch
    # prefers a compiled slis-ui beside the running slis). One slis-ui per
    # (Os, Arch) — the same four targets GoReleaser builds `slis` for — so the
    # templated src resolves to exactly one file per archive.
    files:
      - src: "tui-js/dist/{{ .Os }}-{{ .Arch }}/slis-ui"
        strip_parent: true
        info:
          mode: 0755

checksum:
  name_template: "checksums.txt"

# Publish a prebuilt Homebrew cask to jonnyom/homebrew-tap on every tag, so
# `brew install jonnyom/homebrew-tap/slis` downloads a binary with no build step.
# (Homebrew now prefers casks over formulae for prebuilt binaries; GoReleaser
# deprecated the old `brews` block in favour of `homebrew_casks`.) The push needs
# a PAT with write access to the tap repo, provided as the HOMEBREW_TAP_GITHUB_TOKEN
# env var (set from a repo secret of the same name in release.yml).
homebrew_casks:
  - name: slis
    # Install both the Go CLI/TUI and its compiled JS front-end so bare `slis`
    # (which prefers a sibling `slis-ui`) launches the JS TUI after `brew install`.
    binaries: [slis, slis-ui]
    directory: Casks
    repository:
      owner: jonnyom
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/jonnyom/slis"
    description: "Multi-repo worktree cockpit: a TUI + CLI for working across many git repos at once"
    # slis prefers terminal-notifier for the "Claude needs input" desktop banners
    # when it is on PATH (internal/notify), so pull it in on install. It is a
    # Homebrew formula, not a cask — declare it with `formula:`, not `cask:`.
    dependencies:
      - formula: terminal-notifier
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com
    # Both binaries are unsigned, so strip the macOS quarantine flag on install
    # to avoid Gatekeeper blocking them as "damaged". slis-ui is a bun-compiled
    # standalone binary, equally unsigned, so it needs the same treatment.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/slis"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/slis-ui"]
          end

release:
  github:
    owner: jonnyom
    name: slis

changelog:
  use: github
