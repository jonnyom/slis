name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: build / test / lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Configure git identity (tests create throwaway repos)
        run: |
          git config --global user.email "ci@slis.test"
          git config --global user.name "slis ci"
          git config --global init.defaultBranch main

      - name: Install tmux (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Test
        run: go test ./...

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          "$(go env GOPATH)/bin/golangci-lint" run ./...
