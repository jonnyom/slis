name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: build / test / lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Configure git identity (tests create throwaway repos)
        run: |
          git config --global user.email "ci@slis.test"
          git config --global user.name "slis ci"
          git config --global init.defaultBranch main

      - name: Install tmux (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Test
        run: go test ./...

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          "$(go env GOPATH)/bin/golangci-lint" run ./...

  tui-js:
    name: tui-js (typecheck / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tui-js
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Test
        run: bun test

      - name: Install tmux (for term e2e)
        if: vars.RUN_TUI_E2E == 'true'
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Terminal embed e2e
        if: vars.RUN_TUI_E2E == 'true'
        run: bun run src/term/e2e.ts
