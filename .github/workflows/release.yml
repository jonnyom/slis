name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: goreleaser release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      # GoReleaser's `before` hook cross-compiles `slis-ui` (the JS TUI) for
      # every platform via `bun build --compile`, so bun must be on PATH first.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # Validate the lockfile early (host platform); the GoReleaser hook then
      # adds every platform's optional deps (--cpu '*' --os '*') and compiles.
      - name: Install tui-js dependencies
        working-directory: tui-js
        run: bun install --frozen-lockfile

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for publishing to the Homebrew tap repo (jonnyom/homebrew-tap).
          # Create a GitHub PAT with repo write access and add it as a repository
          # secret named HOMEBREW_TAP_GITHUB_TOKEN. Without it, the brew formula
          # push step will be skipped or fail.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
